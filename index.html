<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Cazando</title>
    <link rel="stylesheet" href="cazando.css">
</head>

<body onload="dibujarIniciar()">

<div class="contenedor">

    <header class="cabecera">
        <h1>🏹 Juego Cazando</h1>
        <p>Autor: <strong>Madelaine</strong></p>
    </header>

    <div class="juego">

        <canvas id="areaJuego" width="500" height="500"></canvas>

        <div class="ladoDerecho">

            <div class="panel">

                <div class="tarjeta">
                    <span class="tituloPanel">⭐ Puntos</span>
                    <span id="puntos">0</span>
                </div>

                <div class="tarjeta">
                    <span class="tituloPanel">⏳ Tiempo</span>
                    <span id="tiempo">10</span>
                </div>

            </div>

            <div class="controles">

                <button onclick="moverArriba()">⬆</button>

                <div class="fila">
                    <button onclick="moverIzquierda()">⬅</button>
                    <button onclick="moverAbajo()">⬇</button>
                    <button onclick="moverDerecha()">➡</button>
                </div>

                <button class="reiniciar" onclick="reiniciar()">
                    Reiniciar
                </button>

            </div>

            <p id="mensaje"></p>

        </div>

    </div>

</div>

<script src="cazando.js"></script>
<script src="util.js"></script>

</body>
</html>
